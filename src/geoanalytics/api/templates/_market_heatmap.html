{# Карта рынка (Finviz-стиль): секторы→активы, площадь ∝ оборот, цвет ∝ дневное изменение. #}
{% if heatmap %}
<svg viewBox="0 0 {{ heatmap.width }} {{ heatmap.height }}"
     style="display:block;width:100%;height:auto;background:var(--panel2);border-radius:10px;">
  {% for c in heatmap.cells %}
  <g>
    <rect x="{{ c.x }}" y="{{ c.y }}" width="{{ c.w }}" height="{{ c.h }}"
          fill="var(--{{ c.css }})" fill-opacity="{{ c.opacity }}" stroke="var(--panel2)"
          stroke-width="1"><title>{{ c.label }}{% if c.pct is not none %} · {{ "%+.2f"|format(c.pct) }}%{% endif %}</title></rect>
    {% if c.show %}
    <text x="{{ c.cx }}" y="{{ c.cy }}" text-anchor="middle"
          {% if c.show_pct %}dominant-baseline="auto"{% else %}dominant-baseline="central"{% endif %}
          fill="#f3f7fb" font-size="{{ c.fs }}" font-weight="700">{{ c.label }}</text>
    {% if c.show_pct %}
    <text x="{{ c.cx }}" y="{{ c.cy + c.fs_pct + 2 }}" text-anchor="middle"
          fill="#eaf1f8" font-size="{{ c.fs_pct }}">{{ "%+.2f"|format(c.pct) }}%</text>
    {% endif %}
    {% endif %}
  </g>
  {% endfor %}
  {% for s in heatmap.sectors %}
  <text x="{{ s.x }}" y="{{ s.y }}" fill="var(--muted)" font-size="11"
        font-weight="600" letter-spacing="0.3">{{ s.label|upper }}</text>
  {% endfor %}
</svg>
{% else %}
<p class="muted">Недостаточно данных по объёмам для карты рынка.</p>
{% endif %}
