<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}geoanalytics{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3" crossorigin="anonymous"></script>
  {# Прототип «Пульс рынка»: фирменные шрифты (display Space Grotesk + data IBM Plex Mono). #}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Wealth Management: charcoal backgrounds, champagne gold accent, muted indicators. */
      --bg: #101214; --panel: #16181b; --panel2: #1e2024; --line: rgba(255, 255, 255, 0.06);
      --fg: #e2e4e9; --muted: #858b93; --accent: #c5a059; --gold: #c5a059;
      --up: #5c9e6a; --down: #c9605e; --flat: #858b93;
      --gn-sector: #a371f7; --gn-peer: #39c5cf;
      --gn-commodity: #c5a059; --gn-fx: #7ba3d4; --gn-macro: #db61a2;
      --font-display: "Inter", -apple-system, "Segoe UI", sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--fg); }
    
    /* --- Sidebar Navigation --- */
    .sidebar-trigger { position: fixed; top: 0; left: 0; bottom: 0; width: 16px; z-index: 199;
                       border-left: 2px solid rgba(255,255,255,0.05); transition: border-color 0.2s; cursor: ew-resize; }
    .sidebar-trigger:hover { border-left-color: var(--muted); }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
      width: 240px; background: rgba(16,18,20,0.85); backdrop-filter: blur(24px);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 32px;
      padding: 32px 24px;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sidebar-trigger:hover + .sidebar, .sidebar:hover { transform: translateX(0); }
    .sidebar .brand { font-family: var(--font-display); font-weight: 600; font-size: 16px;
                    letter-spacing: .5px; color: var(--fg); text-transform: uppercase; }
    .sidebar nav { display: flex; flex-direction: column; gap: 12px; }
    .sidebar nav a { color: var(--muted); font-size: 13px; font-weight: 500; letter-spacing: 0.3px; padding: 6px 0; }
    .sidebar nav a:hover { color: var(--fg); text-decoration: none; }
    .sidebar nav a.active { color: var(--fg); position: relative; }
    .sidebar nav a.active::after { content: ''; position: absolute; left: -24px; top: 50%; transform: translateY(-50%); width: 3px; height: 16px; background: var(--gold); border-radius: 0 4px 4px 0; }
    main { max-width: none; width: 100%; padding: 28px 48px; }
    h1 { font-family: var(--font-display); font-size: 24px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 4px; text-wrap: balance; }
    h2 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .16em;
         color: var(--muted); margin: 0 0 12px; font-weight: 500; text-wrap: balance; }
    .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .panel { background: var(--panel); border: 1px solid var(--line); box-shadow: 0 4px 20px rgba(0,0,0,0.12);
             border-radius: 8px; padding: 24px; transition: border-color .15s, box-shadow .15s; }
    .panel.span2 { grid-column: 1 / -1; }
    .metric { display: flex; justify-content: space-between; padding: 5px 0;
              border-bottom: 1px solid var(--panel2); }
    .metric:last-child { border-bottom: 0; }
    .metric .k { color: var(--muted); }
    .metric .v { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .big { font-family: var(--font-mono); font-size: 30px; font-weight: 600;
           font-variant-numeric: tabular-nums; }
    .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--flat); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--panel2);
             font-variant-numeric: tabular-nums; }
    th { color: var(--muted); font-weight: 600; font-size: 13px; }
    td.num, th.num { text-align: right; font-family: var(--font-mono); }
    form.bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
    input, select, button {
      background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
      border-radius: 6px; padding: 8px 14px; font-size: 13px; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: var(--gold); }
    button { background: var(--panel2); color: var(--fg); border: 1px solid var(--line); font-weight: 500; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    button:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 4px; border: 1px solid var(--line);
           font-size: 11px; background: transparent; color: var(--muted); font-family: var(--font-mono); }
    .muted { color: var(--muted); }
    .chart { width: 100%; height: auto; }
    .chart polyline { fill: none; stroke-width: 2; }
    /* Перекрестие-курсор на графиках (как в торговом терминале) — HTML-оверлей. */
    .chart-wrap { position: relative; display: block; }
    .chart-wrap .xh-vline, .chart-wrap .xh-hline { position: absolute; pointer-events: none;
        background: var(--muted); opacity: .55; display: none; z-index: 3; }
    .chart-wrap .xh-vline { width: 1px; }
    .chart-wrap .xh-hline { height: 1px; }
    .chart-wrap .xh-dot { position: absolute; width: 7px; height: 7px; margin: -3.5px 0 0 -3.5px;
        border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 2px var(--bg);
        pointer-events: none; display: none; z-index: 4; }
    .chart-wrap .xh-price { position: absolute; transform: translateY(-50%); right: 0;
        background: var(--accent); color: #04121f; font: 600 11px/1.4 inherit;
        padding: 0 5px; border-radius: 3px; pointer-events: none; display: none; z-index: 4;
        font-variant-numeric: tabular-nums; }
    .chart-wrap .xh-ohlc { position: absolute; left: 8px; top: 8px;
        background: rgba(15,20,25,.82); border: 1px solid var(--line); border-radius: 4px;
        padding: 3px 7px; font: 11px/1.5 inherit; pointer-events: none; display: none; z-index: 4;
        font-variant-numeric: tabular-nums; white-space: nowrap; }
    .htmx-indicator { opacity: 0; transition: opacity .2s; }
    .htmx-request .htmx-indicator { opacity: 1; }

    /* ============================================================
       TERMINAL UI — новый дизайн-слой (Trader + Dashboard)
       ============================================================ */

    /* --- Status bar (sticky информационная строка) --- */
    .status-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(16,18,20,.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 20px;
      padding: 6px 28px; font-size: 12px; font-family: var(--font-mono);
      color: var(--muted); white-space: nowrap; overflow-x: auto;
    }
    .status-bar .sb-item { display: flex; align-items: center; gap: 6px; }
    .status-bar .sb-sep { color: rgba(255,255,255,0.1); user-select: none; }
    .status-bar .sb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--up); flex-shrink: 0; }
    .status-bar .sb-dot.warn { background: var(--gold); }
    .status-bar .sb-dot.err  { background: var(--down); }

    /* --- Hero panel (minimalist glass) --- */
    .hero-panel {
      background: rgba(22, 24, 27, 0.4);
      backdrop-filter: blur(32px);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 36px 32px 32px; margin-bottom: 24px;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .hero-equity { font-family: var(--font-mono); font-size: 42px; font-weight: 700;
                   letter-spacing: -.02em; font-variant-numeric: tabular-nums;
                   line-height: 1.05; }
    .hero-delta { font-family: var(--font-mono); font-size: 15px; font-weight: 500;
                  margin-top: 2px; font-variant-numeric: tabular-nums; }
    .hero-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; font-size: 12px;
                 font-family: var(--font-mono); color: var(--muted); }
    .hero-meta span b { color: var(--fg); font-weight: 600; margin-left: 4px;
                        font-variant-numeric: tabular-nums; }

    /* --- Heat-strip (полоса дневных P&L) --- */
    .heat-strip { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 14px; }
    .heat-cell {
      height: 20px; flex: 1; min-width: 16px; max-width: 32px;
      border-radius: 3px; cursor: default; position: relative;
      transition: transform .1s, filter .1s;
    }
    .heat-cell:hover { transform: scaleY(1.3); filter: brightness(1.25); z-index: 2; }
    .heat-cell.hc-win  { background: var(--up); }
    .heat-cell.hc-loss { background: var(--down); }
    .heat-cell.hc-flat { background: var(--panel2); }
    .heat-cell.hc-zero { background: #1c2733; }
    /* Подсказка через title отображается нативно, дополнительно — glow на hover */
    .heat-cell.hc-win:hover  { box-shadow: 0 0 8px rgba(47,185,141,.6); }
    .heat-cell.hc-loss:hover { box-shadow: 0 0 8px rgba(255,92,108,.6); }
    .heat-strip-label { font-size: 10px; color: var(--muted); font-family: var(--font-mono);
                        margin-top: 4px; letter-spacing: .06em; text-transform: uppercase; }

    /* --- KPI-карточки терминального стиля --- */
    .kpi-card {
      background: var(--panel); border: 1px solid var(--line); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      border-radius: 8px; padding: 24px;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color .2s, box-shadow .2s;
      animation: fadeInUp .4s ease both;
    }
    .kpi-card:hover { border-color: rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .kpi-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
                 letter-spacing: .14em; color: var(--muted); }
    .kpi-value { font-family: var(--font-mono); font-size: 28px; font-weight: 700;
                 font-variant-numeric: tabular-nums; line-height: 1.1; }
    .kpi-sub   { font-size: 12px; color: var(--muted); font-family: var(--font-mono);
                 font-variant-numeric: tabular-nums; }

    /* Круговой прогресс-бар (CSS-only, conic-gradient) */
    .radial-wrap { display: flex; align-items: center; gap: 14px; }
    .radial-ring {
      --prog: 0deg;
      width: 52px; height: 52px; flex-shrink: 0;
      border-radius: 50%; position: relative;
      background: conic-gradient(var(--ring-color, var(--accent)) var(--prog), var(--panel2) 0deg);
      display: flex; align-items: center; justify-content: center;
    }
    .radial-ring::before {
      content: ''; position: absolute;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--panel);
    }
    .radial-ring span { position: relative; z-index: 1; font-family: var(--font-mono);
                        font-size: 11px; font-weight: 700; }
    .radial-ring.ring-up   { --ring-color: var(--up); }
    .radial-ring.ring-down { --ring-color: var(--down); }
    .radial-ring.ring-gold { --ring-color: var(--gold); }

    /* --- Линейный прогресс-бар с шкалой --- */
    .bar-track { background: var(--panel2); border-radius: 4px; height: 6px;
                 overflow: hidden; margin-top: 6px; }
    .bar-fill  { height: 100%; border-radius: 4px;
                 transition: width .6s cubic-bezier(.25,.46,.45,.94); }

    /* --- Tab switcher (вкладки стратегий) --- */
    .tab-bar {
      display: flex; gap: 4px; flex-wrap: wrap;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; padding: 4px; margin-bottom: 24px;
    }
    .tab-btn {
      padding: 6px 16px; border-radius: 6px; border: none;
      background: transparent; color: var(--muted);
      font-family: var(--font-mono); font-size: 12px;
      cursor: pointer; letter-spacing: .04em;
      transition: background .15s, color .15s;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.03); color: var(--fg); }
    .tab-btn.active {
      background: var(--panel2); color: var(--gold); font-weight: 500;
      border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* --- Цветные строки сделок по типу выхода --- */
    .trade-row--stop { background: rgba(201,96,94,.04); }
    .trade-row--stop:hover { background: rgba(201,96,94,.08) !important; }
    .trade-row--take { background: rgba(92,158,106,.04); }
    .trade-row--take:hover { background: rgba(92,158,106,.08) !important; }
    .trade-row--time { background: rgba(197,160,89,.04); }
    .trade-row--time:hover { background: rgba(197,160,89,.08) !important; }
    .exit-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px; border: 1px solid transparent;
      font-size: 11px; font-weight: 500; font-family: var(--font-mono);
      white-space: nowrap;
    }
    .exit-badge--stop { background: rgba(201,96,94,.1); color: var(--down); border-color: rgba(201,96,94,.2); }
    .exit-badge--take { background: rgba(92,158,106,.1); color: var(--up); border-color: rgba(92,158,106,.2); }
    .exit-badge--time { background: rgba(197,160,89,.1); color: var(--gold); border-color: rgba(197,160,89,.2); }
    .exit-badge--entry { background: rgba(255,255,255,.05); color: var(--fg); border-color: rgba(255,255,255,.1); }
    .exit-badge--other { background: var(--panel2); color: var(--muted); }

    /* Minibar прогресса удержания позиции */
    .hold-bar-wrap { width: 60px; height: 4px; background: var(--panel2);
                     border-radius: 2px; overflow: hidden; display: inline-block; }
    .hold-bar-fill { height: 100%; border-radius: 2px;
                     background: linear-gradient(90deg, var(--accent), var(--gold)); }

    /* --- Sparkline в строке таблицы --- */
    .sparkrow svg { display: block; }

    /* --- Диагностическая панель выходов --- */
    .exit-diag { display: flex; gap: 12px; flex-wrap: wrap; }
    .exit-diag-item { flex: 1; min-width: 140px; padding: 14px 16px;
                      background: var(--panel2); border-radius: 10px; }
    .exit-diag-item .ed-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
    .exit-diag-item .ed-lbl { font-size: 11px; color: var(--muted); margin-top: 2px;
                               font-family: var(--font-mono); text-transform: uppercase;
                               letter-spacing: .1em; }
    .exit-diag-item .ed-sub { font-size: 12px; color: var(--muted); margin-top: 4px;
                               font-variant-numeric: tabular-nums; }
    .exit-warn { background: rgba(242,180,65,.08); border: 1px solid rgba(242,180,65,.3);
                 border-radius: 8px; padding: 10px 14px; margin-top: 10px;
                 font-size: 13px; color: var(--gold); }

    /* --- Micro-animations --- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(197,160,89,.0); }
      50%       { box-shadow: 0 0 12px 2px rgba(197,160,89,.25); }
    }
    .kpi-card:nth-child(1) { animation-delay: .05s; }
    .kpi-card:nth-child(2) { animation-delay: .10s; }
    .kpi-card:nth-child(3) { animation-delay: .15s; }
    .kpi-card:nth-child(4) { animation-delay: .20s; }
    tr { transition: background .12s; }

    /* --- Дизайн-слой: единый язык вместо россыпи инлайн-style (Трек B.3) --- */
    /* Утилиты отступов/типографики под фактические инлайны (см. survey). */
    .mt0 { margin-top: 0; } .mt1 { margin-top: 8px; } .mt2 { margin-top: 14px; } .mt3 { margin-top: 18px; }
    .mb1 { margin-bottom: 8px; } .mb2 { margin-bottom: 14px; } .mb3 { margin-bottom: 18px; }
    .section { margin: 14px 0; }
    .fs-sm { font-size: 13px; } .fs-xs { font-size: 12px; } .fs-xxs { font-size: 11px; }
    /* Лейаут-хелперы. */
    .row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
    .row-wrap { flex-wrap: wrap; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: baseline; }
    .table-wrap { overflow-x: auto; }     /* широкие таблицы скроллятся на мобильном */
    .dash-layout { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr); gap: 24px; align-items: start; margin-top: 14px; }
    .dash-layout > div { min-width: 0; }
    /* Бейдж сигнала — единый «светофор» стойки/рекомендаций (зеркалит бот _SIGNAL_DOT). */
    .sig { display: inline-block; padding: 1px 9px; border-radius: 999px; font-size: 12px;
           font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
    .sig--buy { background: rgba(63,185,80,.15); color: var(--up); border-color: rgba(63,185,80,.35); }
    .sig--hold { background: rgba(210,163,42,.15); color: #d2a32a; border-color: rgba(210,163,42,.35); }
    .sig--sell { background: rgba(248,81,73,.15); color: var(--down); border-color: rgba(248,81,73,.35); }
    .panel { transition: border-color .15s; }
    .panel:hover { border-color: #34465680; }

    /* --- Прототип «Пульс рынка»: герой главной (Направление A) --- */
    .pulse-hero { --ph-up: #5c9e6a; --ph-down: #c9605e; --ph-gold: #c5a059;
      background: rgba(22, 24, 27, 0.4); backdrop-filter: blur(32px); border: 1px solid var(--line);
      border-radius: 8px; padding: 32px; margin: 14px 0; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .ph-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .ph-eyebrow { font: 500 11px/1.4 "IBM Plex Mono", ui-monospace, monospace;
      letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
    .ph-verdict { font: 500 34px/1.05 "Inter", -apple-system, sans-serif;
      letter-spacing: -.02em; margin-top: 8px; text-wrap: balance; }
    .ph-score { font: 500 26px/1 "IBM Plex Mono", ui-monospace, monospace; white-space: nowrap; }
    .ph-up { color: var(--ph-up); } .ph-down { color: var(--ph-down); } .ph-flat { color: var(--muted); }
    .ph-pulse { width: 100%; height: 92px; display: block; margin: 12px 0 2px; overflow: visible; }
    .ph-line { fill: none; stroke-width: 1.5; vector-effect: non-scaling-stroke;
      stroke-linejoin: round; stroke-linecap: round; }
    .ph-stroke-up { stroke: var(--ph-up); } .ph-stroke-down { stroke: var(--ph-down); }
    .ph-zero { stroke: rgba(255,255,255,0.1); stroke-width: 1; stroke-dasharray: 3 5; vector-effect: non-scaling-stroke; }
    .ph-cap { font: 10px/1.4 "IBM Plex Mono", ui-monospace, monospace; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); }
    .ph-vitals { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 14px;
      font: 13px/1.4 "IBM Plex Mono", ui-monospace, monospace; color: var(--muted); }
    .ph-vitals b { font-weight: 600; color: var(--fg); margin-right: 5px;
      font-variant-numeric: tabular-nums; }
    .ph-foot { margin-top: 12px; }
    @keyframes ph-draw { from { stroke-dashoffset: 1400; } to { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: no-preference) {
      .ph-line { stroke-dasharray: 1400; animation: ph-draw 1.1s ease-out forwards; }
    }

    @media (max-width: 1000px) {
      .dash-layout { grid-template-columns: 1fr; }
    }
    /* --- Мобильный адаптив (телефон) --- */
    @media (max-width: 720px) {
      main { padding: 16px 16px 16px 32px; }
      h1 { font-size: 20px; } .big { font-size: 24px; }
      .grid { grid-template-columns: 1fr; }
      form.bar { flex-direction: column; align-items: stretch; }
      form.bar input, form.bar select, form.bar button { width: 100%; }
      .pulse-hero { padding: 18px; } .ph-verdict { font-size: 26px; } .ph-score { font-size: 21px; }
      .ph-vitals { gap: 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
  {% set p = request.url.path if request else '' %}
  <div class="sidebar-trigger"></div>
  <aside class="sidebar">
    <a href="/" class="brand">geoanalytics</a>
    <nav>
      <a href="/" class="{{ 'active' if p == '/' }}">Дашборд</a>
      <a href="/ui/asset" class="{{ 'active' if p.startswith('/ui/asset') }}">Актив</a>
      <a href="/ui/portfolio" class="{{ 'active' if p.startswith('/ui/portfolio') }}">Портфель</a>
      <a href="/ui/factors" class="{{ 'active' if p.startswith('/ui/factors') }}">Факторы</a>
      <a href="/ui/track2" class="{{ 'active' if p.startswith('/ui/track2') }}">Трейдер</a>
      <a href="/ui/backtest" class="{{ 'active' if p.startswith('/ui/backtest') }}">Бэктест</a>
      <a href="/ui/alerts" class="{{ 'active' if p.startswith('/ui/alerts') }}">Алерты</a>
      <a href="/docs">API</a>
    </nav>
  </aside>
  <main>{% block content %}{% endblock %}</main>
  <script>
  // Перекрестие-курсор для inline-SVG графиков. Данные графика — в <script.xh-data> JSON
  // внутри .chart-wrap (контракт charts._xhair). Делегирование на document → переживает
  // HTMX-свапы графика без переинициализации. Библиотек нет.
  (function () {
    var shown = null;
    function q(w, s) { return w.querySelector(s); }
    function hide(w) {
      if (!w) return;
      ['.xh-vline', '.xh-hline', '.xh-dot', '.xh-price', '.xh-ohlc'].forEach(function (s) {
        var el = q(w, s); if (el) el.style.display = 'none';
      });
    }
    function fmt(n) { return (Math.round(n * 100) / 100).toLocaleString('ru-RU'); }
    document.addEventListener('mousemove', function (e) {
      var wrap = e.target.closest ? e.target.closest('.chart-wrap') : null;
      if (shown && shown !== wrap) { hide(shown); shown = null; }
      if (!wrap) return;
      var dataEl = q(wrap, '.xh-data'), svg = q(wrap, 'svg.chart');
      if (!dataEl || !svg) return;
      var d; try { d = JSON.parse(dataEl.textContent); } catch (err) { return; }
      if (!d || !d.bars || !d.bars.length) return;
      var sr = svg.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
      var px = e.clientX - sr.left, py = e.clientY - sr.top;
      if (px < 0 || py < 0 || px > sr.width || py > sr.height) { hide(wrap); shown = null; return; }
      var sx = sr.width / d.w, sy = sr.height / d.h;        // viewBox → экран
      var ox = sr.left - wr.left, oy = sr.top - wr.top;     // смещение svg внутри обёртки
      // снап вертикали к ближайшему бару по X
      var vbx = px / sx, best = d.bars[0], bd = Math.abs(best.x - vbx);
      for (var i = 1; i < d.bars.length; i++) {
        var dd = Math.abs(d.bars[i].x - vbx); if (dd < bd) { bd = dd; best = d.bars[i]; }
      }
      // цена под курсором (свободно по Y): инверсия координаты по lo/hi/pad/h
      var inner = d.h - 2 * d.pad;
      var price = d.lo + (1 - (py / sy - d.pad) / inner) * (d.hi - d.lo);
      var bx = ox + best.x * sx, by = oy + best.y * sy, cy = oy + py;
      var vline = q(wrap, '.xh-vline'), hline = q(wrap, '.xh-hline'),
          dot = q(wrap, '.xh-dot'), tag = q(wrap, '.xh-price'), box = q(wrap, '.xh-ohlc');
      vline.style.left = bx + 'px'; vline.style.top = oy + 'px';
      vline.style.height = sr.height + 'px'; vline.style.display = 'block';
      hline.style.top = cy + 'px'; hline.style.left = ox + 'px';
      hline.style.width = sr.width + 'px'; hline.style.display = 'block';
      dot.style.left = bx + 'px'; dot.style.top = by + 'px'; dot.style.display = 'block';
      tag.style.top = cy + 'px'; tag.style.right = (wr.right - sr.right) + 'px';
      tag.textContent = fmt(price); tag.style.display = 'block';
      if (d.kind === 'candles') {
        box.innerHTML = (best.t ? best.t + '&nbsp; ' : '') +
          'O ' + fmt(best.o) + '&nbsp; H ' + fmt(best.h) +
          '&nbsp; L ' + fmt(best.l) + '&nbsp; C ' + fmt(best.c);
        box.style.color = best.up ? 'var(--up)' : 'var(--down)';
        box.style.display = 'block';
      } else {
        box.innerHTML = (best.t ? best.t + '&nbsp; ' : '') + fmt(best.v);
        box.style.color = 'var(--fg)'; box.style.display = 'block';
      }
      shown = wrap;
    });
  })();
  // Интерактивный граф: zoom/pan для SVG.
  (function () {
    const state = { k: 1, tx: 0, ty: 0 };
    function bindGraph() {
      const svg = document.getElementById('graph-svg');
      const g = document.getElementById('graph-zoom');
      if (!svg || !g || svg.dataset.bound) return;
      svg.dataset.bound = '1';
      const apply = () => g.setAttribute('transform',
        `translate(${state.tx} ${state.ty}) scale(${state.k})`);
      apply();
      const vbUnits = (e) => {
        const r = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal;
        return [vb.x + (e.clientX - r.left) / r.width * vb.width,
                vb.y + (e.clientY - r.top) / r.height * vb.height];
      };
      let drag = false, px = 0, py = 0;
      svg.addEventListener('wheel', (e) => {
        e.preventDefault();
        const [mx, my] = vbUnits(e);
        const f = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        const nk = Math.min(Math.max(state.k * f, 0.3), 6);
        state.tx = mx - (mx - state.tx) * (nk / state.k);
        state.ty = my - (my - state.ty) * (nk / state.k);
        state.k = nk; apply();
      }, { passive: false });
      svg.addEventListener('pointerdown', (e) => {
        drag = true; px = e.clientX; py = e.clientY;
        svg.style.cursor = 'grabbing'; svg.setPointerCapture(e.pointerId);
      });
      svg.addEventListener('pointermove', (e) => {
        if (!drag) return;
        const r = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal;
        state.tx += (e.clientX - px) / r.width * vb.width;
        state.ty += (e.clientY - py) / r.height * vb.height;
        px = e.clientX; py = e.clientY; apply();
      });
      const end = () => { drag = false; svg.style.cursor = 'grab'; };
      svg.addEventListener('pointerup', end);
      svg.addEventListener('pointercancel', end);
    }
    bindGraph();
    document.body.addEventListener('htmx:afterSettle', bindGraph);
  })();
  </script>
</body>
</html>
